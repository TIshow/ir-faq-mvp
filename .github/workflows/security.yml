name: Security

# セキュリティ系チェックは CI とは別ワークフローに分離（責務分割・権限分離）。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC に全履歴フルスキャン

permissions:
  contents: read

jobs:
  # --- シークレット検出（gitleaks）----------------------------------------
  # 平文の鍵・パスワード・トークンの混入を検出。過去に init-db.py で平文PWを
  # コミットした経緯があるため最重要。既知の是正済みPWは .gitleaks.toml で許可。
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴をスキャン（過去コミットの漏洩も検出）
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- 静的解析（CodeQL / SAST）-------------------------------------------
  # GitHub純正の静的解析。JS/TS と Python の脆弱性・危険パターンを検出。
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # 検出結果を Security タブへ送るために必要
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4
