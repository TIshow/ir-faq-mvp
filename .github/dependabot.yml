# Dependabot: 依存の脆弱性修正と更新を自動でPR化する。
# 過去に Next.js の脆弱性で更新を迫られた経緯があり、自動追従で再発を防ぐ。
version: 2
updates:
  # フロント（npm）
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # マイナー/パッチはまとめて1PRに（PRノイズ削減）
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]

  # エージェント（Python / uv は pip エコシステムで解決）
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, agent]

  # GitHub Actions 自身のバージョン更新
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]
